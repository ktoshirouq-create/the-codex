<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Codex</title>
    
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <!-- CACHE BUSTER V22 -->
    <link rel="stylesheet" href="styles.css?v=22">
</head>
<body>
    <div id="loader" class="loader-overlay"><span class="loader-text">SYNCING CODEX...</span></div>

    <!-- CUSTOM SELECTION MODAL -->
    <div id="selection-modal" class="custom-modal hidden">
        <div class="modal-content glass-panel" id="modal-content-area">
            <div class="drag-handle"></div>
            <div class="modal-header" id="modal-drag-zone">
                <h3 id="selection-modal-title" class="text-gold" style="letter-spacing: 2px;">SELECT</h3>
                <button id="close-selection-modal" class="action-btn" style="font-size:2.2rem; line-height:0.5; font-weight:300;">&times;</button>
            </div>
            <div id="selection-modal-list" class="modal-list"></div>
        </div>
    </div>

    <header class="top-bar">
        <h1 class="brand">THE CODEX</h1>
        <button id="edit-toggle" class="lock-btn">LOCKED</button>
    </header>

    <div id="ptr-indicator" class="ptr-indicator">↓ PULL TO REFRESH ↓</div>

    <main class="content-area" id="scroll-area">
        
        <!-- ZONE 1: THE CODEX (Vault & Parser) -->
        <section id="codex-module" class="module active">
            
            <div id="admin-parser-ui" class="card glass-panel edit-panel hidden">
                <h2 class="card-title text-gold">SMART PARSER</h2>
                <input type="text" id="spec-title-input" class="premium-text-input" placeholder="Cocktail Title">
                <textarea id="keep-paste-area" class="premium-text-input" placeholder="Paste Keep recipe here...&#10;e.g.&#10;30ml Campari&#10;30ml Gin" rows="4"></textarea>
                <button id="parse-btn" class="btn-secondary">PARSE SPEC</button>

                <div id="staging-area" class="hidden" style="margin-top: 20px;">
                    <h3 class="zone-header">STAGING REVIEW</h3>
                    <div id="staging-list"></div>
                    <button id="sync-vault-btn" class="btn-primary burgundy-btn" style="margin-top: 20px;">SYNC TO VAULT</button>
                </div>
            </div>

            <div class="card glass-panel" style="padding: 25px 15px;">
                <h2 class="card-title text-muted border-bottom pb-10" style="padding-left: 5px;">DATABASE</h2>
                <input type="text" id="vault-search" class="search-pill w-100" placeholder="Search Specs & Batches...">
                <div id="managed-vault-list"></div>
            </div>
        </section>

        <!-- ZONE 2: THE LAB (Prep & Math) -->
        <section id="lab-module" class="module">
            
            <!-- ABV CALCULATOR -->
            <div class="card glass-panel">
                <h2 class="card-title text-gold">ABV CALCULATOR</h2>
                <button id="btn-abv-spec" class="premium-basic-input custom-select-btn w-100 mb-20 text-muted">Select Spec...</button>
                
                <div id="abv-ing-container" class="hidden mb-20">
                    <h3 class="zone-header">BASE INGREDIENTS (ABV %)</h3>
                    <div id="abv-ing-list"></div>
                    
                    <div class="flex-row mt-20" style="align-items: center; justify-content: space-between; border-top: 1px solid #333; padding-top: 15px;">
                        <label class="text-muted text-sm">Target Dilution</label>
                        <div class="stepper-control mini-stepper" style="width: 120px;">
                            <button id="abv-dil-minus" class="stepper-btn">−</button>
                            <span id="abv-dil-val" class="stepper-value">20%</span>
                            <button id="abv-dil-plus" class="stepper-btn">+</button>
                        </div>
                    </div>
                    
                    <button id="calc-abv-btn" class="btn-primary mt-20 cyan-btn">CALCULATE FINAL ABV</button>
                    <div id="abv-results" class="output-container mt-20"></div>
                </div>
            </div>

            <!-- CULINARY ENGINE: WASHING -->
            <div class="card glass-panel">
                <h2 class="card-title text-gold">FAT & PROTEIN WASHING</h2>
                <div class="pill-group">
                    <button class="wash-pill active" data-val="milk">MILK PUNCH</button>
                    <button class="wash-pill" data-val="fat">FAT WASH</button>
                </div>

                <!-- Milk Wash UI -->
                <div id="ui-milk-wash">
                    <div class="input-group">
                        <label class="text-muted text-sm mb-10" style="display:block">Total Punch Volume (ml)</label>
                        <div class="massive-input"><input type="number" id="milk-punch-vol" value="1000"></div>
                    </div>
                </div>

                <!-- Fat Wash UI -->
                <div id="ui-fat-wash" class="hidden">
                    <label class="text-muted text-sm mb-10" style="display:block">Fat Intensity</label>
                    <button id="btn-fat-type" class="premium-basic-input custom-select-btn w-100 mb-20">Standard (Butter / Coconut Oil)</button>
                    <div class="input-group">
                        <label class="text-muted text-sm mb-10" style="display:block">Spirit Volume (ml)</label>
                        <div class="massive-input"><input type="number" id="fat-spirit-vol" value="700"></div>
                    </div>
                </div>

                <button id="calc-wash-btn" class="btn-secondary mt-20">CALCULATE WASH</button>
                <div id="wash-results" class="output-container mt-20"></div>
            </div>

            <!-- ACID ADJUSTER -->
            <div class="card glass-panel">
                <h2 class="card-title text-gold">LIQUID INTEL: ACID ADJUSTER</h2>
                <div class="flex-row mb-20">
                    <div class="half-width">
                        <label class="text-muted text-sm">Base Liquid</label>
                        <button id="btn-acid-base" class="premium-basic-input custom-select-btn w-100">Orange Juice (~1%)</button>
                    </div>
                    <div class="half-width">
                        <label class="text-muted text-sm">Target</label>
                        <button id="btn-acid-target" class="premium-basic-input custom-select-btn w-100">Lemon (6% Citric)</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Volume (ml)</label>
                    <div class="massive-input"><input type="number" id="acid-vol" value="1000"></div>
                </div>
                <button id="calc-acid-btn" class="btn-secondary mt-20">ADJUST ACID</button>
                <div id="acid-results" class="output-container mt-20"></div>
            </div>
            
            <!-- MODIFIER ENGINE -->
            <div class="card glass-panel">
                <h2 class="card-title text-gold">MODIFIER ENGINE</h2>
                <div class="input-group">
                    <label>Strained Syrup Weight (g)</label>
                    <div class="massive-input"><input type="number" id="mod-weight" value="1000"></div>
                </div>
                <div class="pill-group">
                    <button class="mod-pill active" data-val="cordial">CORDIAL (ACID)</button>
                    <button class="mod-pill" data-val="shrub">SHRUB (VINEGAR)</button>
                </div>
                <button id="calc-mod-btn" class="btn-secondary">CALCULATE FINISH</button>
                <div id="mod-results" class="output-container mt-20"></div>
            </div>
        </section>

        <!-- ZONE 3: SCALE (Events & Batching) -->
        <section id="scale-module" class="module">
            
            <div class="card glass-panel">
                <h2 class="card-title text-gold">FORWARD BATCH (EVENTS)</h2>
                <button id="btn-forward-spec" class="premium-basic-input custom-select-btn w-100 mb-20 text-muted">Select Spec...</button>
                
                <div class="flex-row">
                    <div class="half-width">
                        <label class="text-muted text-sm">Target Drinks</label>
                        <div class="stepper-control mt-10">
                            <button id="fd-minus" class="stepper-btn">−</button>
                            <span id="fd-val" class="stepper-value">20</span>
                            <button id="fd-plus" class="stepper-btn">+</button>
                        </div>
                    </div>
                    <div class="half-width">
                        <label class="text-muted text-sm">Dilution %</label>
                        <div class="stepper-control mt-10">
                            <button id="dil-minus" class="stepper-btn">−</button>
                            <span id="dil-val" class="stepper-value">20%</span>
                            <button id="dil-plus" class="stepper-btn">+</button>
                        </div>
                    </div>
                </div>
                <div class="quick-pills flex-row mb-20 mt-20">
                    <button class="quick-pill-btn" onclick="updateDilution(0)">0% (None)</button>
                    <button class="quick-pill-btn" onclick="updateDilution(20)">20% (Stirred)</button>
                    <button class="quick-pill-btn" onclick="updateDilution(25)">25% (Shaken)</button>
                </div>

                <button id="calc-forward-btn" class="btn-primary">CALCULATE BATCH</button>
                <div id="forward-results" class="output-container mt-20"></div>
            </div>

            <div class="card glass-panel">
                <h2 class="card-title text-gold">REVERSE BATCH (LIMITING FACTOR)</h2>
                <button id="btn-reverse-spec" class="premium-basic-input custom-select-btn w-100 mb-20 text-muted">Select Spec...</button>
                <button id="btn-reverse-ing" class="premium-basic-input custom-select-btn w-100 mb-20 hidden text-muted">Select Limiting Ingredient...</button>
                
                <div id="reverse-vol-container" class="hidden">
                    <div class="input-group">
                        <label>Available Volume (ml)</label>
                        <div class="massive-input"><input type="number" id="reverse-vol" value="700"></div>
                    </div>
                    <button id="calc-reverse-btn" class="btn-primary burgundy-btn">CALCULATE MAX YIELD</button>
                    <div id="reverse-results" class="output-container mt-20"></div>
                </div>
            </div>
        </section>

    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <button class="nav-tab active" data-target="codex-module">
            <span class="nav-icon">📖</span><span class="nav-label">CODEX</span>
        </button>
        <button class="nav-tab" data-target="lab-module">
            <span class="nav-icon">🧪</span><span class="nav-label">THE LAB</span>
        </button>
        <button class="nav-tab" data-target="scale-module">
            <span class="nav-icon">⚖️</span><span class="nav-label">SCALE</span>
        </button>
    </nav>

    <!-- CACHE BUSTER V22 -->
    <script src="app.js?v=22"></script>
</body>
</html>
